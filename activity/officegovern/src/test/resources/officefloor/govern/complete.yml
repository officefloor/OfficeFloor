governance:
  source: ${TestClass}$CompleteGovernance
  properties:
    property: available
  outputs:
    FLOW: logic
  escalations:
    java.io.IOException: ioHandler

composition:
  escalations:
    java.sql.SQLException: sqlHandler

logic:
  class: ${TestClass}$LogicService

ioHandler:
  class: ${TestClass}$IoHandlerService

sqlHandler:
  class: ${TestClass}$SqlHandlerService
