
# Convenience to make test configuration easier
officefloor.rest.config.base.package=net.officefloor.spring.starter.rest
officefloor.rest.config.cors.package=${officefloor.rest.config.base.package}.cors.officefloor
officefloor.rest.config.data.jpa.package=${officefloor.rest.config.base.package}.data.jpa.officefloor
officefloor.rest.config.data.jpa.common.package=${officefloor.rest.config.base.package}.data.jpa.common
officefloor.rest.config.officefloor.package=${officefloor.rest.config.base.package}.officefloor.officefloor
officefloor.rest.config.security.package=${officefloor.rest.config.base.package}.security.officefloor
officefloor.rest.config.thymeleaf.package=${officefloor.rest.config.base.package}.thymeleaf.officefloor
officefloor.rest.config.validation.package=${officefloor.rest.config.base.package}.validation.officefloor
officefloor.rest.config.mvc.package=${officefloor.rest.config.base.package}.mvc.officefloor
officefloor.rest.config.web.package=${officefloor.rest.config.base.package}.web.officefloor
officefloor.rest.config.async.package=${officefloor.rest.config.base.package}.async.officefloor
officefloor.rest.config.cache.package=${officefloor.rest.config.base.package}.cache.officefloor
officefloor.rest.config.jwt.package=${officefloor.rest.config.base.package}.jwt.officefloor

# Property Value test
officefloor.spring.test.value=TestValue

# Avoid logs filling (as testing)
spring.jpa.show-sql=false
logging.level.org.hibernate=OFF

# H2 in-memory for development
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
