<!DOCTYPE html>
<html>
<body>
    <table border="1">
        <tr th:each="post : ${model.posts}">
            <td th:text="${post.text}">text</td>
        </tr>
    </table>
    <form action="/post" method="POST">
        <input name="text" type="text" />
        <input type="submit" value="Post" />
    </form>
</body>
</html>
