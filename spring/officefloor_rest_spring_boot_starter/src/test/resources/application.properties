
# Convenience to make test configuration easier
officefloor.rest.config.testcase=net.officefloor.spring.starter.rest.OfficeFloorSpecificTest
officefloor.spring.test.value=TestValue

# Avoid logs filling (as testing)
spring.jpa.show-sql=false
logging.level.org.hibernate=OFF

# H2 in-memory for development
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
